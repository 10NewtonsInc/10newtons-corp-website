<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88">
  <!--
    Browser-tab favicon. Distinct from `logo-mark.svg` (which lives
    on the green topbar at ~32×32 where the dark outer-ring colors
    read fine against the topbar's tinted background).

    The tab favicon needs to read at 16×16 against EITHER a light or
    dark browser tab — Chrome's default light tab AND Firefox /
    Safari dark-mode tabs. Two adjustments vs. logo-mark.svg:

      1. A bright rounded-square card behind the dots. White-with-a-
         hint-of-green so the dark teal outer ring has contrast to
         show against in BOTH tab themes. The rounding (rx=14) makes
         the icon feel like a brand mark, not a clipped circle.
      2. Outer-ring colors lifted ~25% (lightness boost + saturation
         bump). The dot pattern still reads as concentric rings; just
         brighter than the source so 16×16 renders aren't muddy.

    Keep `logo-mark.svg` in sync if the brand mark changes — the
    pattern + positions here mirror it; only colors + the bg card
    differ.
  -->
  <rect width="88" height="88" rx="14" fill="#f0fdf4"/>
  <g>
    <!-- Center -->
    <circle cx="44.00" cy="44.00" r="2.38" fill="#d0de45"/>
