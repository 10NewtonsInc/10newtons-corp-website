<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="10 Newtons is the first SaaS platform that quantifies surgical mastery — turning any recorded procedure into objective, comparable measures of surgical skill."
    />
    <title>10 Newtons — Quantifying Surgical Mastery</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static form for Netlify's build-time form detection. The real form is
      rendered by React (ContactForm.tsx) and isn't in the static HTML, so
      Netlify needs this hidden copy to register the "contact" form + fields.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
